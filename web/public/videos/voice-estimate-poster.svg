    <rect x="110" y="282" width="500" height="56" rx="14" fill="#334155"/>
    <rect x="110" y="372" width="330" height="34" rx="12" fill="#475569"/>
    <rect x="110" y="428" width="430" height="34" rx="12" fill="#475569"/>
    <rect x="110" y="484" width="380" height="34" rx="12" fill="#475569"/>
    <rect x="110" y="590" width="500" height="92" rx="22" fill="#1e293b"/>
